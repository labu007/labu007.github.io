<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500&display=swap" rel="stylesheet">
<style>
/* ── THEME TOKENS ─────────────────────────────────────────────── */
:root {
  --a: #00e5b0; --a2: #ff6b6b; --a3: #ffd166; --a4: #74b9ff;
  --r: 12px; --r-lg: 20px; --r-xl: 28px;
  --sans: 'Bricolage Grotesque', system-ui, sans-serif;
  --display: 'Syne', system-ui, sans-serif;
  --ease: cubic-bezier(0.4,0,0.2,1);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="dark"] {
  --bg:#080a0f; --bg1:#0e1117; --bg2:#141820;
  --surface:rgba(20,24,32,0.82); --border:rgba(255,255,255,0.065);
  --border2:rgba(255,255,255,0.13); --text:#f0f2f8; --text2:#8a93b0;
  --text3:#4a5068; --nav-bg:rgba(8,10,15,0.85); --mm-bg:rgba(8,10,15,0.97);
  --orb-op:0.12; --stroke-ghost:rgba(240,242,248,0.28);
}
[data-theme="light"] {
  --bg:#f4f5f7; --bg1:#ecedf0; --bg2:#e4e5e9;
  --surface:rgba(255,255,255,0.85); --border:rgba(0,0,0,0.07);
  --border2:rgba(0,0,0,0.14); --text:#0f1117; --text2:#4a5068;
  --text3:#9aa3b8; --nav-bg:rgba(244,245,247,0.88); --mm-bg:rgba(244,245,247,0.98);
  --orb-op:0.06; --stroke-ghost:rgba(15,17,23,0.22);
}

/* ── BASE ──────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;font-size:16px;scroll-padding-top:68px;}
body{
  font-family:var(--sans); background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
  transition:background .4s var(--ease),color .4s var(--ease);
}

/* ── MESH ──────────────────────────────────────────────────────── */
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.mesh-orb{position:absolute;border-radius:50%;filter:blur(110px);opacity:var(--orb-op);animation:drift 20s ease-in-out infinite alternate;transition:opacity .4s;}
.mesh-orb:nth-child(1){width:580px;height:580px;background:var(--a);top:-180px;right:-80px;}
.mesh-orb:nth-child(2){width:480px;height:480px;background:var(--a4);bottom:0;left:-120px;animation-duration:25s;animation-delay:-8s;}
.mesh-orb:nth-child(3){width:380px;height:380px;background:var(--a2);top:40%;left:42%;animation-duration:22s;animation-delay:-4s;}
@keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(38px,-28px) scale(1.07);}}

/* ── PROGRESS ──────────────────────────────────────────────────── */
#progress{position:fixed;top:0;left:0;z-index:400;height:2.5px;background:linear-gradient(90deg,var(--a),var(--a4));width:0%;transition:width .12s linear;pointer-events:none;}

/* ── NAV ───────────────────────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1.25rem,4vw,3rem);
  background:var(--nav-bg);backdrop-filter:blur(22px) saturate(180%);
  border-bottom:1px solid var(--border);transition:background .4s;
}
.nav-brand{font-family:var(--display);font-size:1rem;font-weight:700;color:var(--text);letter-spacing:-.02em;text-decoration:none;flex-shrink:0;}
.nav-brand span{color:var(--a);}
.nav-center{display:flex;gap:2px;background:var(--border);border:1px solid var(--border);border-radius:99px;padding:4px;}
.nav-center a{padding:6px 13px;border-radius:99px;font-size:.78rem;font-weight:500;color:var(--text2);text-decoration:none;white-space:nowrap;transition:color .2s,background .2s;}
[data-theme="dark"]  .nav-center a:hover,[data-theme="dark"]  .nav-center a.active{color:var(--text);background:rgba(255,255,255,.1);}
[data-theme="light"] .nav-center a:hover,[data-theme="light"] .nav-center a.active{color:var(--text);background:rgba(0,0,0,.07);}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.theme-toggle{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border2);border-radius:99px;padding:5px 10px;cursor:pointer;font-size:.75rem;color:var(--text2);font-family:var(--sans);transition:all .25s;white-space:nowrap;}
.theme-toggle:hover{border-color:var(--a);color:var(--a);}
.nav-pill{padding:8px 18px;background:var(--a);color:#080a0f;border:none;border-radius:99px;font-family:var(--sans);font-size:.8rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s,transform .2s var(--spring);}
.nav-pill:hover{opacity:.84;transform:scale(1.03);}
.hamburger{display:none;background:none;border:1px solid var(--border2);border-radius:8px;padding:7px 9px;cursor:pointer;flex-direction:column;gap:4px;align-items:center;justify-content:center;}
.hamburger span{display:block;width:18px;height:1.5px;background:var(--text2);border-radius:2px;transition:all .3s;}
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;z-index:190;background:var(--mm-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1.5rem 2rem;flex-direction:column;gap:4px;}
.mobile-menu.open{display:flex;}
.mobile-menu a{padding:11px 14px;border-radius:10px;font-size:1rem;color:var(--text2);text-decoration:none;transition:color .2s,background .2s;}
.mobile-menu a:hover{color:var(--text);}

/* ── HERO ──────────────────────────────────────────────────────── */
#hero{min-height:100vh;display:flex;align-items:center;padding:7rem clamp(1.25rem,5vw,3rem) 4rem;position:relative;z-index:1;}
.hero-inner{max-width:1120px;margin:0 auto;width:100%;display:grid;grid-template-columns:1.1fr .9fr;gap:4rem;align-items:center;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:1.5rem;font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--a);}
.hero-eyebrow-dot{width:7px;height:7px;border-radius:50%;background:var(--a);box-shadow:0 0 8px var(--a);animation:blink 2.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
.hero-h1{font-family:var(--display);font-size:clamp(2.8rem,6vw,5rem);font-weight:800;line-height:1;letter-spacing:-.04em;color:var(--text);margin-bottom:1.75rem;}
.hero-h1 .line{display:block;}
.hero-h1 .accent-line{color:transparent;-webkit-text-stroke:1.5px var(--stroke-ghost);}
.hero-h1 .highlight{color:var(--a);}
.hero-body{font-size:1.05rem;color:var(--text2);line-height:1.75;max-width:480px;margin-bottom:2.5rem;}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap;}
.btn-main{padding:13px 26px;background:var(--a);color:#080a0f;font-family:var(--sans);font-size:.9rem;font-weight:600;border:none;border-radius:99px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:transform .25s var(--spring),opacity .2s;}
.btn-main:hover{transform:scale(1.04);opacity:.88;}
.btn-outline{padding:13px 26px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--sans);font-size:.9rem;font-weight:500;border-radius:99px;cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s;}
.btn-outline:hover{border-color:var(--text2);color:var(--text);}
.hero-right{display:flex;flex-direction:column;gap:14px;}
.hcard{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:1.25rem 1.5rem;backdrop-filter:blur(16px);transition:transform .3s var(--spring),border-color .3s;}
.hcard:hover{transform:translateY(-3px);}
.hcard-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.avatar-hex{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--a),var(--a4));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:1.3rem;color:#080a0f;flex-shrink:0;}
.hcard-name{font-family:var(--display);font-weight:700;font-size:1.05rem;color:var(--text);}
.hcard-sub{font-size:.78rem;color:var(--text2);margin-top:2px;}
.social-row{display:flex;gap:6px;flex-wrap:wrap;}
.s-chip{padding:5px 12px;border-radius:99px;background:rgba(255,255,255,.05);border:1px solid var(--border);font-size:.72rem;color:var(--text2);text-decoration:none;transition:all .2s;}
[data-theme="light"] .s-chip{background:rgba(0,0,0,.04);}
.s-chip:hover{background:rgba(0,229,176,.1);border-color:rgba(0,229,176,.3);color:var(--a);}
.stat-mini-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-mini{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.85rem;text-align:center;}
.stat-mini-n{font-family:var(--display);font-weight:800;font-size:1.5rem;color:var(--a);display:block;}
.stat-mini-l{font-size:.68rem;color:var(--text3);margin-top:2px;display:block;}
.status-bar{display:flex;align-items:center;gap:8px;background:rgba(0,229,176,.06);border:1px solid rgba(0,229,176,.18);border-radius:99px;padding:8px 16px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--a);animation:blink 2.2s infinite;}
.status-text{font-size:.78rem;color:var(--a);font-weight:500;}

/* ── SECTION SHARED ────────────────────────────────────────────── */
.section{padding:clamp(4rem,8vh,6rem) clamp(1.25rem,5vw,3rem);position:relative;z-index:1;}
.section-inner{max-width:1120px;margin:0 auto;}
.section-header{margin-bottom:2.5rem;}
.section-kicker{font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--a);margin-bottom:6px;}
.section-h2{font-family:var(--display);font-weight:800;font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.1;letter-spacing:-.03em;color:var(--text);}
.section-h2 em{font-style:normal;color:var(--a);}
.section-p{font-size:.93rem;color:var(--text2);max-width:500px;margin-top:10px;line-height:1.7;}
.divider{height:1px;background:var(--border);margin:0 clamp(1.25rem,5vw,3rem);position:relative;z-index:1;}

/* ── SHOW MORE BTN ─────────────────────────────────────────────── */
.show-more-btn{display:inline-flex;align-items:center;gap:7px;margin-top:1.75rem;padding:10px 22px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--sans);font-size:.83rem;font-weight:500;border-radius:99px;cursor:pointer;transition:border-color .25s,color .25s,background .25s;}
.show-more-btn:hover{border-color:var(--a);color:var(--a);background:rgba(0,229,176,.05);}
.show-more-btn .arr{display:inline-block;transition:transform .35s var(--ease);}
.show-more-btn.open .arr{transform:rotate(180deg);}

/* ── ABOUT ─────────────────────────────────────────────────────── */
#about{background:var(--bg1);}
.about-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:3rem;align-items:start;}
.about-text p{font-size:.96rem;color:var(--text2);line-height:1.85;margin-bottom:1rem;}
.about-text strong{color:var(--text);font-weight:600;}
.tags-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:1.5rem;}
.tag-chip{padding:6px 14px;border-radius:99px;background:var(--surface);border:1px solid var(--border2);font-size:.78rem;color:var(--text2);transition:all .2s;cursor:default;}
.tag-chip:hover{border-color:rgba(0,229,176,.4);color:var(--a);background:rgba(0,229,176,.06);}
.contact-panel{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xl);padding:1.75rem;backdrop-filter:blur(16px);}
.cp-title{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--text);margin-bottom:1.25rem;}
.cp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.83rem;color:var(--text2);}
.cp-row:last-child{border-bottom:none;padding-bottom:0;}
.cp-icon{width:32px;height:32px;border-radius:9px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.cp-link{color:var(--text2);text-decoration:none;transition:color .2s;}
.cp-link:hover{color:var(--a);}

/* ── SKILLS ────────────────────────────────────────────────────── */
#skills{background:var(--bg);}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.skill-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;transition:transform .3s var(--spring),border-color .3s;}
.skill-card:hover{transform:translateY(-4px) scale(1.02);border-color:var(--border2);}
.skill-card-icon{font-size:1.4rem;margin-bottom:10px;display:block;}
.skill-card-label{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.skill-item{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.skill-item:last-child{margin-bottom:0;}
.sk-name{font-size:.83rem;color:var(--text2);flex:1;}
.sk-bar-wrap{width:52px;height:4px;background:var(--border2);border-radius:99px;overflow:hidden;}
.sk-bar{height:100%;border-radius:99px;background:var(--a);width:80%;transform:scaleX(0);transform-origin:left;transition:transform .8s var(--ease);}
.skill-card:hover .sk-bar{transform:scaleX(1);}

/* ── EDUCATION ─────────────────────────────────────────────────── */
#education{background:var(--bg1);}
.edu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.edu-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.75rem;transition:border-color .3s,transform .3s var(--spring);position:relative;overflow:hidden;}
.edu-card:hover{border-color:var(--border2);transform:translateY(-3px);}
.edu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--a),var(--a4));transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease);}
.edu-card:hover::before{transform:scaleX(1);}
.edu-degree{font-family:var(--display);font-weight:700;font-size:1rem;color:var(--text);margin-bottom:4px;}
.edu-field{font-size:.85rem;color:var(--a);font-weight:500;margin-bottom:10px;}
.edu-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.edu-badge{padding:3px 10px;border-radius:99px;font-size:.71rem;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text3);}
.edu-summary{font-size:.83rem;color:var(--text2);line-height:1.65;margin-bottom:12px;}
.edu-detail{max-height:0;overflow:hidden;transition:max-height .4s var(--ease);font-size:.83rem;color:var(--text2);line-height:1.7;}
.edu-card.expanded .edu-detail{max-height:300px;}
.edu-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.edu-uni-link{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;color:var(--text2);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;transition:all .2s;}
.edu-uni-link:hover{border-color:rgba(0,229,176,.3);color:var(--a);background:rgba(0,229,176,.05);}
.edu-more-btn{background:none;border:none;cursor:pointer;font-size:.75rem;color:var(--text3);font-family:var(--sans);display:flex;align-items:center;gap:4px;transition:color .2s;padding:6px 0;}
.edu-more-btn:hover{color:var(--a);}
.edu-more-btn .arr{display:inline-block;transition:transform .3s var(--ease);}
.edu-card.expanded .edu-more-btn .arr{transform:rotate(180deg);}

/* ── EXPERIENCE ────────────────────────────────────────────────── */
#experience{background:var(--bg);}
.exp-list{display:flex;flex-direction:column;gap:10px;}
.exp-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color .3s;}
.exp-item.open{border-color:rgba(0,229,176,.25);}
.exp-head{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;cursor:pointer;user-select:none;gap:1rem;}
.exp-head-left{display:flex;align-items:center;gap:1rem;flex:1;min-width:0;}
.exp-icon{width:42px;height:42px;border-radius:11px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.exp-title-wrap{min-width:0;}
.exp-title{font-family:var(--display);font-weight:700;font-size:.97rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exp-org{font-size:.79rem;color:var(--text2);margin-top:2px;}
.exp-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.exp-date{font-size:.73rem;color:var(--text3);white-space:nowrap;background:var(--surface);padding:4px 10px;border-radius:99px;border:1px solid var(--border);}
.exp-toggle{width:28px;height:28px;border-radius:8px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;}
.exp-toggle svg{width:13px;height:13px;stroke:var(--text2);transition:transform .3s var(--ease);}
.exp-item.open .exp-toggle svg{transform:rotate(180deg);}
.exp-body{max-height:0;overflow:hidden;transition:max-height .45s var(--ease);}
.exp-item.open .exp-body{max-height:360px;}
.exp-body-inner{padding:1.25rem 1.5rem 1.5rem;border-top:1px solid var(--border);}
.exp-desc{font-size:.88rem;color:var(--text2);line-height:1.75;margin-bottom:8px;}
.exp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.exp-tag{padding:4px 10px;border-radius:6px;background:var(--surface);border:1px solid var(--border);font-size:.72rem;color:var(--text3);}

/* ── PROJECTS ──────────────────────────────────────────────────── */
#projects{background:var(--bg1);}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.75rem;display:flex;flex-direction:column;gap:12px;transition:border-color .3s,transform .35s var(--spring);position:relative;overflow:hidden;}
.proj-card:hover{transform:translateY(-5px);border-color:rgba(0,229,176,.25);}
.proj-card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(0,229,176,.05),transparent 60%);opacity:0;transition:opacity .4s;pointer-events:none;}
.proj-card:hover::after{opacity:1;}
.proj-top{display:flex;justify-content:space-between;align-items:flex-start;}
.proj-type-chip{padding:4px 10px;border-radius:99px;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.pt-research{background:rgba(0,229,176,.1);color:var(--a);border:1px solid rgba(0,229,176,.2);}
.pt-engineering{background:rgba(116,185,255,.1);color:var(--a4);border:1px solid rgba(116,185,255,.2);}
.pt-collaboration{background:rgba(255,209,102,.1);color:var(--a3);border:1px solid rgba(255,209,102,.2);}
.pt-tool{background:rgba(255,107,107,.1);color:var(--a2);border:1px solid rgba(255,107,107,.2);}
.proj-glyph{font-size:1.6rem;line-height:1;}
.proj-title{font-family:var(--display);font-weight:700;font-size:1.05rem;color:var(--text);line-height:1.3;}
.proj-desc{font-size:.84rem;color:var(--text2);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.proj-card.expanded .proj-desc{display:block;-webkit-line-clamp:unset;overflow:visible;}
.proj-footer{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;}
.proj-tech{padding:3px 9px;border-radius:5px;background:var(--surface);border:1px solid var(--border);font-size:.7rem;color:var(--text3);}
.proj-expand-btn{background:none;border:none;cursor:pointer;font-size:.75rem;color:var(--text3);font-family:var(--sans);display:flex;align-items:center;gap:4px;padding:4px 0;transition:color .2s;}
.proj-expand-btn:hover{color:var(--a);}
.proj-expand-btn .arr{display:inline-block;transition:transform .3s;}
.proj-card.expanded .proj-expand-btn .arr{transform:rotate(180deg);}

/* ── PUBLICATIONS ──────────────────────────────────────────────── */
#research{background:var(--bg);}
.research-list{display:flex;flex-direction:column;gap:10px;}
.research-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color .3s;}
.research-item.open{border-color:rgba(116,185,255,.3);}
.research-head{display:flex;align-items:flex-start;gap:1.25rem;padding:1.25rem 1.5rem;cursor:pointer;user-select:none;}
.research-year{font-family:var(--display);font-weight:800;font-size:1.4rem;color:var(--a4);min-width:50px;padding-top:2px;}
.research-meta{flex:1;}
.research-title{font-family:var(--display);font-weight:700;font-size:.97rem;color:var(--text);margin-bottom:4px;line-height:1.35;}
.research-venue{font-size:.78rem;color:var(--text3);}
.research-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.rb{padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:600;}
.rb-j{background:rgba(116,185,255,.1);color:var(--a4);border:1px solid rgba(116,185,255,.2);}
.rb-c{background:rgba(0,229,176,.1);color:var(--a);border:1px solid rgba(0,229,176,.2);}
.rb-award{background:rgba(255,209,102,.1);color:var(--a3);border:1px solid rgba(255,209,102,.2);}
.rb-pre{background:rgba(255,107,107,.1);color:var(--a2);border:1px solid rgba(255,107,107,.2);}
.research-toggle-btn{width:30px;height:30px;border-radius:9px;flex-shrink:0;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .25s;}
.research-toggle-btn svg{width:13px;height:13px;stroke:var(--text2);transition:transform .3s;}
.research-item.open .research-toggle-btn svg{transform:rotate(180deg);}
.research-body{max-height:0;overflow:hidden;transition:max-height .45s var(--ease);}
.research-item.open .research-body{max-height:300px;}
.research-body-inner{padding:1.25rem 1.5rem 1.5rem;border-top:1px solid var(--border);}
.research-abstract{font-size:.87rem;color:var(--text2);line-height:1.75;}

/* ── AWARDS ────────────────────────────────────────────────────── */
#awards{background:var(--bg1);}
.awards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.award-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.35rem;transition:border-color .3s,transform .3s var(--spring);}
.award-card:hover{border-color:rgba(255,209,102,.3);transform:translateY(-3px);}
.award-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.award-emoji{font-size:1.5rem;}
.award-yr{font-family:var(--display);font-weight:800;font-size:.85rem;color:var(--a3);background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.18);padding:3px 9px;border-radius:99px;}
.award-name{font-family:var(--display);font-weight:700;font-size:.93rem;color:var(--text);margin-bottom:4px;line-height:1.35;}
.award-by{font-size:.78rem;color:var(--text2);}

/* ── CONTACT ───────────────────────────────────────────────────── */
#contact{background:var(--bg);}
.contact-wrap{max-width:700px;margin:0 auto;text-align:center;}
.contact-wrap .section-h2{margin-bottom:1rem;}
.contact-wrap>p{font-size:.97rem;color:var(--text2);margin-bottom:2.5rem;line-height:1.75;}
.contact-btns{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:2.5rem;}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.c-link{display:flex;align-items:center;gap:7px;padding:11px 14px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);font-size:.82rem;color:var(--text2);text-decoration:none;transition:all .25s;justify-content:center;}
.c-link:hover{border-color:rgba(0,229,176,.3);color:var(--a);background:rgba(0,229,176,.06);}

/* ── FOOTER ────────────────────────────────────────────────────── */
footer{padding:2rem clamp(1.25rem,5vw,3rem);border-top:1px solid var(--border);position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem;}
.footer-left{font-size:.8rem;color:var(--text3);}
.footer-left strong{color:var(--text2);font-weight:600;}
.footer-right{font-size:.78rem;color:var(--text3);}

/* ── REVEAL ────────────────────────────────────────────────────── */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s var(--ease),transform .6s var(--ease);}
.reveal.in{opacity:1;transform:none;}
.reveal-delay-1{transition-delay:.1s;}
.reveal-delay-2{transition-delay:.2s;}

/* ── LOADING SCREEN ────────────────────────────────────────────── */
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .5s;}
#loading.fade{opacity:0;pointer-events:none;}
.loading-dot{width:10px;height:10px;border-radius:50%;background:var(--a);animation:ldot 1s ease-in-out infinite;}
.loading-label{font-size:.82rem;color:var(--text2);}
@keyframes ldot{0%,100%{transform:scale(.5);opacity:.3;}50%{transform:scale(1);opacity:1;}}

/* ── RESPONSIVE ────────────────────────────────────────────────── */
@media(max-width:900px){
  .hero-inner{grid-template-columns:1fr;gap:3rem;}
  .about-grid{grid-template-columns:1fr;gap:2rem;}
  .nav-center{display:none;}
  .hamburger{display:flex;}
  .nav-pill{display:none;}
  .theme-toggle .label{display:none;}
}
@media(max-width:600px){
  .projects-grid{grid-template-columns:1fr;}
  .skills-grid{grid-template-columns:repeat(2,1fr);}
  .awards-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="loading-dot"></div>
  <div class="loading-label">Loading portfolio…</div>
</div>

<div id="progress"></div>

<div class="mesh" aria-hidden="true">
  <div class="mesh-orb"></div><div class="mesh-orb"></div><div class="mesh-orb"></div>
</div>

<!-- NAV (populated by JS) -->
<nav role="navigation" aria-label="Main navigation">
  <a href="#hero" class="nav-brand" id="navBrand">Portfolio</a>
  <div class="nav-center" id="navCenter">
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#education">Education</a>
    <a href="#experience">Experience</a>
    <a href="#projects">Projects</a>
    <a href="#research">Research</a>
    <a href="#awards">Awards</a>
    <a href="#contact">Contact</a>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle">
      <span id="themeIcon">☀️</span>
      <span class="label" id="themeLabel">Light</span>
    </button>
    <a href="#contact" class="nav-pill">Let's Talk →</a>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu" role="menu">
  <a href="#about"      onclick="closeMobile()">About</a>
  <a href="#skills"     onclick="closeMobile()">Skills</a>
  <a href="#education"  onclick="closeMobile()">Education</a>
  <a href="#experience" onclick="closeMobile()">Experience</a>
  <a href="#projects"   onclick="closeMobile()">Projects</a>
  <a href="#research"   onclick="closeMobile()">Research</a>
  <a href="#awards"     onclick="closeMobile()">Awards</a>
  <a href="#contact"    onclick="closeMobile()">Contact</a>
</div>

<!-- All sections rendered by JS into #app -->
<div id="app"></div>

<footer>
  <div class="footer-left" id="footerLeft"><strong>Portfolio</strong></div>
  <div class="footer-right">Designed &amp; built with intent · 2025</div>
</footer>

<!-- ════════════════════════════════════════════════
     RENDERER  —  reads data/portfolio.json
════════════════════════════════════════════════ -->
<script>
const ICON_MAP = { '🔬':true,'💼':true,'🎓':true,'⚙️':true,'🌐':true,'🧠':true,'🔭':true,'📱':true,'🎯':true };
const PROJ_GLYPHS = ['🧠','⚙️','🌐','📱','🔭','🎯','🔬','💡'];
const AWARD_EMOJIS = ['🏆','🎓','🌟','💡','🎖','✈️','🔥','⭐'];

/* ── Helpers ── */
const el = (tag, cls, html='') => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };
const esc = s => String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function splitTitleOrg(title) {
  // Split "Role — Organization" or "Role, Organization" patterns
  const m = title.match(/^(.+?)\s*[—–\-,]\s*(.+)$/);
  if (m) return { role: m[1].trim(), org: m[2].trim() };
  return { role: title, org: '' };
}

function detectProjType(details) {
  const all = details.join(' ').toLowerCase();
  if (all.includes('type:research'))    return 'research';
  if (all.includes('type:engineering')) return 'engineering';
  if (all.includes('type:collaboration'))return 'collaboration';
  if (all.includes('type:tool'))        return 'tool';
  if (all.includes('open-source') || all.includes('github') || all.includes('library')) return 'engineering';
  if (all.includes('collaboration') || all.includes('multi-site')) return 'collaboration';
  return 'research';
}

/* ── SECTION BUILDERS ── */

function buildHero(header, sections) {
  const name = header.name || 'Your Name';
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const email = header.email || 'you@university.edu';
  const bio = sections.about?.bio || '';
  const projCount  = (sections.projects||[]).length;
  const pubCount   = (sections.publications||[]).length;
  const awardCount = (sections.awards||[]).length;
  const linkedin = header.linkedin || '#';
  const github   = header.github   || '#';
  const links    = header.links    || [];

  return `
<section id="hero" aria-label="Introduction">
  <div class="hero-inner">
    <div class="reveal in">
      <div class="hero-eyebrow">
        <span class="hero-eyebrow-dot"></span>
        Open to opportunities · Master's Candidate
      </div>
      <h1 class="hero-h1">
        <span class="line">Building what</span>
        <span class="line accent-line">doesn't exist</span>
        <span class="line highlight">yet.</span>
      </h1>
      <p class="hero-body">${esc(bio) || `I'm <strong>${esc(name)}</strong> — a graduate researcher and engineer blending <strong>technical depth</strong> with <strong>creative thinking</strong>.`}</p>
      <div class="hero-ctas">
        <a href="#projects" class="btn-main">Explore My Work →</a>
        <a href="#" class="btn-outline">Download CV</a>
      </div>
    </div>
    <div class="hero-right reveal reveal-delay-1">
      <div class="hcard">
        <div class="hcard-top">
          <div class="avatar-hex">${esc(initials)}</div>
          <div>
            <div class="hcard-name">${esc(name)}</div>
            <div class="hcard-sub">MSc Candidate</div>
          </div>
        </div>
        <div class="social-row">
          ${linkedin !== '#' ? `<a href="${esc(linkedin)}" class="s-chip" target="_blank">LinkedIn</a>` : ''}
          ${github   !== '#' ? `<a href="${esc(github)}"   class="s-chip" target="_blank">GitHub</a>`   : ''}
          ${links.map(l=>`<a href="${esc(l)}" class="s-chip" target="_blank">${l.includes('scholar')?'Scholar':l.includes('researchgate')?'ResearchGate':'Link'}</a>`).join('')}
          <a href="#" class="s-chip">YouTube</a>
        </div>
      </div>
      <div class="stat-mini-row">
        <div class="stat-mini"><span class="stat-mini-n">${projCount||'6'}+</span><span class="stat-mini-l">Projects</span></div>
        <div class="stat-mini"><span class="stat-mini-n">${pubCount||'3'}</span><span class="stat-mini-l">Publications</span></div>
        <div class="stat-mini"><span class="stat-mini-n">${awardCount||'5'}</span><span class="stat-mini-l">Awards</span></div>
      </div>
      <div class="hcard" style="padding:.85rem 1.25rem;">
        <div class="status-bar">
          <span class="status-dot"></span>
          <span class="status-text">Available for grad roles &amp; research collab</span>
        </div>
      </div>
    </div>
  </div>
</section>`;
}

function buildAbout(header, sections) {
  const bio = sections.about?.bio || '';
  const email = header.email || '';
  const location = header.location || '';
  const linkedin = header.linkedin || '#';
  const github = header.github || '#';
  const links = header.links || [];

  return `
<section class="section" id="about" aria-labelledby="about-h">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-kicker">About Me</div>
      <h2 class="section-h2" id="about-h">Curious by nature.<br><em>Rigorous by training.</em></h2>
    </div>
    <div class="about-grid">
      <div class="about-text reveal">
        <p>${esc(bio)}</p>
        <div class="tags-row" id="skillTags"></div>
        <button class="show-more-btn" id="about-btn" onclick="toggleBlock('about-extra','about-btn','Read more','Show less')">
          Read more <em class="arr">↓</em>
        </button>
        <div id="about-extra" style="display:none;margin-top:1rem;">
          <p>I believe the best ideas live at the boundary between disciplines. My goal is to be fluent enough in code, mathematics, design, and communication to move between them fluidly — and to build things that actually ship.</p>
        </div>
      </div>
      <div class="contact-panel reveal reveal-delay-2">
        <div class="cp-title">Reach Me</div>
        ${email ? `<div class="cp-row"><div class="cp-icon">✉</div><a href="mailto:${esc(email)}" class="cp-link">${esc(email)}</a></div>` : ''}
        ${location ? `<div class="cp-row"><div class="cp-icon">📍</div><span>${esc(location)}</span></div>` : ''}
        ${linkedin !== '#' ? `<div class="cp-row"><div class="cp-icon">🔗</div><a href="${esc(linkedin)}" class="cp-link" target="_blank">LinkedIn</a></div>` : ''}
        ${github !== '#' ? `<div class="cp-row"><div class="cp-icon">🐙</div><a href="${esc(github)}" class="cp-link" target="_blank">GitHub</a></div>` : ''}
        ${links.map(l=>`<div class="cp-row"><div class="cp-icon">🔬</div><a href="${esc(l)}" class="cp-link" target="_blank">${l.includes('scholar')?'Google Scholar':l.includes('researchgate')?'ResearchGate':l}</a></div>`).join('')}
        <div class="cp-row"><div class="cp-icon">▶</div><a href="#" class="cp-link">YouTube Channel</a></div>
        <div class="cp-row"><div class="cp-icon">🏛</div><a href="#" class="cp-link">Current Lab</a></div>
      </div>
    </div>
  </div>
</section>`;
}

function buildSkills(skills) {
  if (!skills?.length) return '';
  const catIcons = ['🐍','🤖','📊','🛠','🌐','✍️','🔬','💡'];
  const visible = skills.slice(0, 3);
  const hidden  = skills.slice(3);

  const cardHTML = (cat, idx) => `
    <div class="skill-card">
      <span class="skill-card-icon">${catIcons[idx % catIcons.length]}</span>
      <div class="skill-card-label">${esc(cat.category)}</div>
      ${cat.items.slice(0,5).map(item=>`
        <div class="skill-item">
          <span class="sk-name">${esc(item)}</span>
          <div class="sk-bar-wrap"><div class="sk-bar" style="width:${70+Math.random()*25|0}%"></div></div>
        </div>`).join('')}
    </div>`;

  return `
<section class="section" id="skills" aria-labelledby="skills-h">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-kicker">Technical Skills</div>
      <h2 class="section-h2" id="skills-h">Built for<br><em>complex problems.</em></h2>
      <p class="section-p">Hover any card to reveal proficiency indicators.</p>
    </div>
    <div class="skills-grid reveal">${visible.map((c,i)=>cardHTML(c,i)).join('')}</div>
    ${hidden.length ? `
    <div id="skills-extra" style="display:none;">
      <div class="skills-grid" style="margin-top:12px;">${hidden.map((c,i)=>cardHTML(c,i+visible.length)).join('')}</div>
    </div>
    <button class="show-more-btn" id="skills-btn" onclick="toggleGrid('skills-extra','skills-btn','Show more skills','Show fewer skills')">
      Show more skills <em class="arr">↓</em>
    </button>` : ''}
  </div>
</section>`;
}

function buildEducation(edu) {
  if (!edu?.length) return '';
  const cards = edu.map((e,i)=>{
    const {role, org} = splitTitleOrg(e.title);
    const details = (e.details||[]).filter(d=>!d.startsWith('type:'));
    return `
    <div class="edu-card reveal${i>0?' reveal-delay-'+Math.min(i,2):''}" id="edu${i}">
      <div class="edu-degree">${esc(role)}</div>
      <div class="edu-field">${esc(org)}</div>
      <div class="edu-meta">
        ${e.year?`<span class="edu-badge">${esc(e.year)}</span>`:''}
      </div>
      <p class="edu-summary">${esc(details[0]||'')}</p>
      <div class="edu-detail">
        ${details.slice(1).map(d=>`<p style="margin-bottom:6px">${esc(d)}</p>`).join('')}
      </div>
      <div class="edu-toggle-row">
        <a href="#" target="_blank" rel="noopener" class="edu-uni-link">
          ${esc(org||'University')}
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10L10 2M4 2h6v6"/></svg>
        </a>
        <button class="edu-more-btn" onclick="toggleEdu('edu${i}')">Details <em class="arr">↓</em></button>
      </div>
    </div>`;
  });

  return `
<section class="section" id="education" aria-labelledby="edu-h">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-kicker">Education</div>
      <h2 class="section-h2" id="edu-h">Academic<br><em>foundation.</em></h2>
    </div>
    <div class="edu-grid">${cards.join('')}</div>
  </div>
</section>`;
}

function buildExperience(exp) {
  if (!exp?.length) return '';
  const icons = ['🔬','💼','🎓','🏢','⚗️'];
  const items = exp.map((e,i)=>{
    const {role, org} = splitTitleOrg(e.title);
    const details = (e.details||[]).filter(d=>!d.startsWith('type:'));
    return `
    <div class="exp-item reveal${i>0?' reveal-delay-'+Math.min(i,2):''}">
      <div class="exp-head" onclick="toggleExp(this)" role="button" aria-expanded="false" tabindex="0">
        <div class="exp-head-left">
          <div class="exp-icon">${icons[i%icons.length]}</div>
          <div class="exp-title-wrap">
            <div class="exp-title">${esc(role)}</div>
            <div class="exp-org">${esc(org)}</div>
          </div>
        </div>
        <div class="exp-right">
          <div class="exp-date">${esc(e.year||'')}</div>
          <button class="exp-toggle" aria-label="Expand">
            <svg viewBox="0 0 14 14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5l5 5 5-5"/></svg>
          </button>
        </div>
      </div>
      <div class="exp-body">
        <div class="exp-body-inner">
          ${details.map(d=>`<p class="exp-desc">${esc(d)}</p>`).join('')}
        </div>
      </div>
    </div>`;
  });

  return `
<section class="section" id="experience" aria-labelledby="exp-h">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-kicker">Experience</div>
      <h2 class="section-h2" id="exp-h">Where I've<br><em>made impact.</em></h2>
      <p class="section-p">Click any role to expand the full story.</p>
    </div>
    <div class="exp-list">${items.join('')}</div>
  </div>
</section>`;
}

function buildProjects(projects) {
  if (!projects?.length) return '';
  const typeClass = { research:'pt-research', engineering:'pt-engineering', collaboration:'pt-collaboration', tool:'pt-tool' };
  const typeLabel = { research:'Research', engineering:'Engineering', collaboration:'Collaboration', tool:'Tool / App' };

  const cards = projects.map((p,i)=>{
    const type = detectProjType(p.details||[]);
    const details = (p.details||[]).filter(d=>!d.startsWith('type:'));
    const glyph = PROJ_GLYPHS[i % PROJ_GLYPHS.length];
    return `
    <div class="proj-card${i>=3?' hidden-proj':''}" id="pc${i}">
      <div class="proj-top">
        <span class="proj-type-chip ${typeClass[type]||'pt-research'}">${typeLabel[type]||'Research'}</span>
        <span class="proj-glyph">${glyph}</span>
      </div>
      <div class="proj-title">${esc(p.title)}</div>
      <p class="proj-desc">${details.slice(0,3).map(esc).join(' · ')}</p>
      <button class="proj-expand-btn" onclick="toggleCard('pc${i}')">More details <em class="arr">↓</em></button>
      <div class="proj-footer">
        ${details.slice(3).map(d=>`<span class="proj-tech">${esc(d)}</span>`).join('')}
      </div>
    </div>`;
  });

  const hasHidden = projects.length > 3;
  return `
<section class="section" id="projects" aria-labelledby="proj-h">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-kicker">Projects</div>
      <h2 class="section-h2" id="proj-h">Things I've<br><em>actually built.</em></h2>
      <p class="section-p">Showing 3 of ${projects.length}. Click a card to expand.</p>
    </div>
    <div class="projects-grid" id="projGrid">${cards.join('')}</div>
    ${hasHidden ? `<button class="show-more-btn" id="projects-btn" onclick="toggleProjects()">Show all ${projects.length} projects <em class="arr">↓</em></button>` : ''}
  </div>
</section>`;
}

function buildPublications(pubs) {
  if (!pubs?.length) return '';
  const typeClass = { journal:'rb-j', conference:'rb-c', preprint:'rb-pre' };
  const typeLabel = { journal:'Journal', conference:'Conference', preprint:'Preprint' };

  const items = pubs.map((p,i)=>`
    <div class="research-item reveal${i>0?' reveal-delay-'+Math.min(i,2):''}">
      <div class="research-head" onclick="toggleResearch(this)" role="button" aria-expanded="false" tabindex="0">
        <div class="research-year">${esc(p.year||'—')}</div>
        <div class="research-meta">
          <div class="research-title">${esc(p.title)}</div>
          <div class="research-venue">${esc(p.venue||'')}</div>
          <div class="research-badges">
            <span class="rb ${typeClass[p.type]||'rb-c'}">${typeLabel[p.type]||'Paper'}</span>
          </div>
        </div>
        <button class="research-toggle-btn" aria-label="Show details">
          <svg viewBox="0 0 14 14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5l5 5 5-5"/></svg>
        </button>
      </div>
      <div class="research-body">
        <div class="research-body-inner">
          <p class="research-abstract">Published in <em>${esc(p.venue||'')}</em>. Click the Google Scholar link in your contact panel for the full abstract and citation count.</p>
        </div>
      </div>
    </div>`);

  return `
<section class="section" id="research" aria-labelledby="research-h">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-kicker">Research &amp; Publications</div>
      <h2 class="section-h2" id="research-h">Published &amp;<br><em>peer-reviewed.</em></h2>
      <p class="section-p">Click any entry to expand. Full list on Google Scholar.</p>
    </div>
    <div class="research-list">${items.join('')}</div>
  </div>
</section>`;
}

function buildAwards(awards) {
  if (!awards?.length) return '';
  const visible = awards.slice(0,3);
  const hidden  = awards.slice(3);

  const cardHTML = (a,i) => `
    <div class="award-card reveal${i>0?' reveal-delay-'+Math.min(i,2):''}">
      <div class="award-top">
        <span class="award-emoji">${AWARD_EMOJIS[i%AWARD_EMOJIS.length]}</span>
        <span class="award-yr">${esc(a.year||'')}</span>
      </div>
      <div class="award-name">${esc(a.name)}</div>
      <div class="award-by">${esc(a.org||'')}</div>
    </div>`;

  return `
<section class="section" id="awards" aria-labelledby="awards-h">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-kicker">Awards &amp; Recognition</div>
      <h2 class="section-h2" id="awards-h">Recognized for<br><em>doing good work.</em></h2>
    </div>
    <div class="awards-grid">${visible.map((a,i)=>cardHTML(a,i)).join('')}</div>
    ${hidden.length ? `
    <div id="awards-extra" style="display:none;">
      <div class="awards-grid" style="margin-top:12px;">${hidden.map((a,i)=>cardHTML(a,i+visible.length)).join('')}</div>
    </div>
    <button class="show-more-btn" id="awards-btn" onclick="toggleGrid('awards-extra','awards-btn','Show all awards','Show fewer awards')">
      Show all awards <em class="arr">↓</em>
    </button>` : ''}
  </div>
</section>`;
}

function buildContact(header) {
  const email = header.email || 'you@university.edu';
  const linkedin = header.linkedin || '#';
  const github = header.github || '#';
  const links = header.links || [];

  return `
<section class="section" id="contact" aria-labelledby="contact-h">
  <div class="section-inner">
    <div class="contact-wrap reveal">
      <div class="section-kicker" style="text-align:center;">Contact</div>
      <h2 class="section-h2" id="contact-h" style="text-align:center;margin-bottom:1rem;">
        Let's build<br><em>something together.</em>
      </h2>
      <p>Whether you're a recruiter, collaborator, or potential advisor — my inbox is open. I reply within 48 hours.</p>
      <div class="contact-btns">
        <a href="mailto:${esc(email)}" class="btn-main">✉ Send an Email</a>
        <a href="#" class="btn-outline">Download CV</a>
      </div>
      <div class="contact-grid">
        ${linkedin !== '#' ? `<a href="${esc(linkedin)}" class="c-link" target="_blank"><span>🔗</span> LinkedIn</a>` : ''}
        ${github   !== '#' ? `<a href="${esc(github)}"   class="c-link" target="_blank"><span>🐙</span> GitHub</a>`   : ''}
        ${links.filter(l=>l.includes('scholar')).map(l=>`<a href="${esc(l)}" class="c-link" target="_blank"><span>📚</span> Scholar</a>`).join('')}
        ${links.filter(l=>l.includes('researchgate')).map(l=>`<a href="${esc(l)}" class="c-link" target="_blank"><span>🔬</span> ResearchGate</a>`).join('')}
        <a href="#" class="c-link"><span>▶</span> YouTube</a>
        <a href="#" class="c-link"><span>🏛</span> Lab Page</a>
      </div>
    </div>
  </div>
</section>`;
}

/* ── MAIN RENDER ── */
async function render() {
  let data;
  try {
    const res = await fetch('./data/portfolio.json');
    if (!res.ok) throw new Error('JSON not found');
    data = await res.json();
  } catch (err) {
    document.getElementById('loading').innerHTML =
      '<p style="color:var(--a2);font-family:var(--sans);font-size:.9rem;">⚠️ Could not load portfolio.json — make sure it exists in <code>data/</code></p>';
    return;
  }

  const { header = {}, sections = {} } = data;
  const name = header.name || 'Portfolio';

  // Update page title & nav brand
  document.title = name + ' — Portfolio';
  document.getElementById('navBrand').innerHTML = name.split(' ')[0] + '<span>.</span>' + (name.split(' ')[1]||'');
  document.getElementById('footerLeft').innerHTML = `<strong>${esc(name)}</strong> · MSc Candidate`;

  // Inject skill tags into About
  const skillTags = (sections.skills||[]).flatMap(c=>c.items).slice(0,8);

  const html = [
    buildHero(header, sections),
    '<div class="divider"></div>',
    buildAbout(header, sections),
    '<div class="divider"></div>',
    buildSkills(sections.skills),
    '<div class="divider"></div>',
    buildEducation(sections.education),
    '<div class="divider"></div>',
    buildExperience(sections.experience),
    '<div class="divider"></div>',
    buildProjects(sections.projects),
    '<div class="divider"></div>',
    buildPublications(sections.publications),
    '<div class="divider"></div>',
    buildAwards(sections.awards),
    '<div class="divider"></div>',
    buildContact(header),
  ].filter(Boolean).join('\n');

  document.getElementById('app').innerHTML = html;

  // Inject skill tags
  const tagEl = document.getElementById('skillTags');
  if (tagEl) tagEl.innerHTML = skillTags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('');

  // Hide hidden projects (> index 2)
  document.querySelectorAll('.hidden-proj').forEach(c=>c.style.display='none');

  // Re-run reveal observer
  document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));
  document.querySelectorAll('.exp-head').forEach(h=>{
    h.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleExp(h);} });
  });
  document.querySelectorAll('.research-head').forEach(h=>{
    h.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleResearch(h);} });
  });

  // Fade out loading screen
  const loading = document.getElementById('loading');
  loading.classList.add('fade');
  setTimeout(()=>loading.style.display='none', 500);
}

/* ── INTERACTION HELPERS ── */
function toggleBlock(blockId, btnId, labelMore, labelLess) {
  const block = document.getElementById(blockId);
  const btn   = document.getElementById(btnId);
  if (!block||!btn) return;
  const open = block.style.display === 'none';
  block.style.display = open ? 'block' : 'none';
  btn.classList.toggle('open', open);
  btn.childNodes[0].textContent = (open ? labelLess : labelMore) + ' ';
  btn.querySelector('.arr').textContent = open ? '↑' : '↓';
}
function toggleGrid(blockId, btnId, labelMore, labelLess) {
  const block = document.getElementById(blockId);
  const btn   = document.getElementById(btnId);
  if (!block||!btn) return;
  const open = block.style.display === 'none';
  block.style.display = open ? 'block' : 'none';
  btn.classList.toggle('open', open);
  btn.childNodes[0].textContent = (open ? labelLess : labelMore) + ' ';
  btn.querySelector('.arr').textContent = open ? '↑' : '↓';
}
function toggleProjects() {
  const hidden = document.querySelectorAll('.hidden-proj');
  const btn = document.getElementById('projects-btn');
  const open = hidden[0]?.style.display === 'none';
  hidden.forEach(c=>c.style.display = open ? 'flex' : 'none');
  if (btn) {
    btn.classList.toggle('open', open);
    btn.querySelector('.arr').textContent = open ? '↑' : '↓';
  }
}
function toggleCard(id) {
  const card = document.getElementById(id);
  if (!card) return;
  const exp = card.classList.toggle('expanded');
  const btn = card.querySelector('.proj-expand-btn');
  if (btn) btn.childNodes[0].textContent = exp ? 'Show less ' : 'More details ';
}
function toggleEdu(id) {
  document.getElementById(id)?.classList.toggle('expanded');
}
function toggleExp(head) {
  const item = head.closest('.exp-item');
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.exp-item.open').forEach(el=>{
    el.classList.remove('open');
    el.querySelector('.exp-head').setAttribute('aria-expanded','false');
  });
  if (!isOpen) { item.classList.add('open'); head.setAttribute('aria-expanded','true'); }
}
function toggleResearch(head) {
  const item = head.closest('.research-item');
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.research-item.open').forEach(el=>{
    el.classList.remove('open');
    el.querySelector('.research-head').setAttribute('aria-expanded','false');
  });
  if (!isOpen) { item.classList.add('open'); head.setAttribute('aria-expanded','true'); }
}

/* ── THEME ── */
const html_ = document.documentElement;
function applyTheme(t) {
  html_.setAttribute('data-theme', t);
  document.getElementById('themeIcon').textContent  = t==='dark' ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = t==='dark' ? 'Light' : 'Dark';
  localStorage.setItem('theme', t);
}
document.getElementById('themeToggle').addEventListener('click',()=>{
  applyTheme(html_.getAttribute('data-theme')==='dark'?'light':'dark');
});
const saved = localStorage.getItem('theme');
if (saved) applyTheme(saved);

/* ── SCROLL ── */
window.addEventListener('scroll', ()=>{
  const max = document.body.scrollHeight - window.innerHeight;
  document.getElementById('progress').style.width = (window.scrollY/max*100)+'%';
});

/* ── REVEAL ── */
const revealObs = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting){e.target.classList.add('in');revealObs.unobserve(e.target);} });
},{threshold:.08,rootMargin:'0px 0px -30px 0px'});

/* ── ACTIVE NAV ── */
const navObs = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      document.querySelectorAll('.nav-center a').forEach(l=>l.classList.remove('active'));
      const a=document.querySelector('.nav-center a[href="#'+e.target.id+'"]');
      if(a)a.classList.add('active');
    }
  });
},{threshold:.35});
// Re-observe after render
const waitForSections = setInterval(()=>{
  const secs = document.querySelectorAll('section[id]');
  if(secs.length>0){ secs.forEach(s=>navObs.observe(s)); clearInterval(waitForSections); }
},200);

/* ── MOBILE MENU ── */
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');
hamburger.addEventListener('click',()=>{
  const open = mobileMenu.classList.toggle('open');
  hamburger.setAttribute('aria-expanded', open);
  const s = hamburger.querySelectorAll('span');
  if(open){s[0].style.transform='rotate(45deg) translate(4px,4px)';s[1].style.opacity='0';s[2].style.transform='rotate(-45deg) translate(4px,-4px)';}
  else{s.forEach(x=>{x.style.transform='';x.style.opacity='';})}
});
function closeMobile(){
  mobileMenu.classList.remove('open');
  hamburger.setAttribute('aria-expanded','false');
  hamburger.querySelectorAll('span').forEach(s=>{s.style.transform='';s.style.opacity='';});
}
window.addEventListener('resize',()=>{ if(window.innerWidth>900)closeMobile(); });

/* ── BOOT ── */
render();
</script>
</body>
</html>
